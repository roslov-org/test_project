<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create your account — PureAir</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark: #2d6a4f; --green-mid: #52b788; --green-pale: #d8f3dc;
      --text: #1b1b1b; --text-secondary: #4a4a4a; --font-heading: 'Poppins', sans-serif;
      --border: #ddd; --radius: 12px; --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text); line-height: 1.6;
      min-height: 100vh; display: flex; flex-direction: column;
      background: linear-gradient(rgba(27,67,50,0.55), rgba(45,106,79,0.7)),
        url('https://images.pexels.com/photos/34358244/pexels-photo-34358244.jpeg?auto=compress&cs=tinysrgb&w=1920') center/cover no-repeat fixed;
    }
    a { color: var(--green-pale); text-decoration: none; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card {
      background: #fff; width: 100%; max-width: 420px; padding: 40px 32px;
      border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .brand {
      font-family: var(--font-heading); font-weight: 700; font-size: 1.5rem;
      color: var(--green-dark); text-align: center; margin-bottom: 4px;
    }
    .card h1 {
      font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700;
      color: var(--text); text-align: center; margin-bottom: 6px;
    }
    .card .sub { text-align: center; color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 28px; }
    form { display: flex; flex-direction: column; gap: 18px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-family: var(--font-heading); font-weight: 600; font-size: 0.9rem; }
    input {
      padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 1rem; font-family: inherit; transition: border-color 0.2s, outline 0.2s;
    }
    input:focus { outline: 2px solid var(--green-mid); outline-offset: 1px; border-color: var(--green-mid); }
    .btn {
      margin-top: 6px; padding: 14px 32px; border: none; border-radius: var(--radius);
      background: var(--green-dark); color: #fff; font-family: var(--font-heading);
      font-weight: 600; font-size: 1rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .btn:focus-visible { outline: 2px solid var(--green-dark); outline-offset: 2px; }
    .back { display: block; text-align: center; margin-top: 22px; color: var(--green-dark); font-size: 0.9rem; }
    .footer { padding: 20px; text-align: center; color: var(--green-pale); font-size: 0.85rem; }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div class="brand">PureAir</div>
      <h1>Create your account</h1>
      <p class="sub">Join PureAir and start breathing better today.</p>

      <form action="/register" method="POST">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Choose a password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn">Sign Up</button>
      </form>

      <a class="back" href="/">&larr; Back to PureAir</a>
    </div>
  </main>

  <footer class="footer">&copy; 2026 PureAir (demo). Demonstration registration form.</footer>
</body>
</html>
