<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your account — PureAir</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark: #2d6a4f; --green-mid: #52b788; --green-pale: #d8f3dc;
      --text: #1b1b1b; --text-secondary: #4a4a4a; --font-heading: 'Poppins', sans-serif;
      --radius: 12px; --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text); line-height: 1.6;
      min-height: 100vh; display: flex; flex-direction: column;
      background: linear-gradient(rgba(27,67,50,0.55), rgba(45,106,79,0.7)),
        url('https://images.pexels.com/photos/34358244/pexels-photo-34358244.jpeg?auto=compress&cs=tinysrgb&w=1920') center/cover no-repeat fixed;
    }
    a { text-decoration: none; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card {
      background: #fff; width: 100%; max-width: 520px; padding: 48px 36px; text-align: center;
      border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .brand {
      font-family: var(--font-heading); font-weight: 700; font-size: 1.5rem;
      color: var(--green-dark); margin-bottom: 24px;
    }
    .check {
      width: 72px; height: 72px; margin: 0 auto 24px; border-radius: 50%;
      background: var(--green-pale); color: var(--green-dark);
      display: flex; align-items: center; justify-content: center; font-size: 2.2rem;
    }
    h1 {
      font-family: var(--font-heading); font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 700; color: var(--green-dark); line-height: 1.3;
    }
    h1 .email { color: var(--text); word-break: break-all; }
    .btn {
      display: inline-block; margin-top: 28px; padding: 14px 32px; border-radius: var(--radius);
      background: var(--green-dark); color: #fff; font-family: var(--font-heading);
      font-weight: 600; font-size: 1rem; transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .footer { padding: 20px; text-align: center; color: var(--green-pale); font-size: 0.85rem; }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div class="brand">PureAir</div>
      <div class="check" aria-hidden="true">&#10003;</div>
      <h1>Вы успешно зарегистрированы <span class="email" id="email"></span></h1>
      <a class="btn" href="/">На главную</a>
    </div>
  </main>

  <footer class="footer">&copy; 2026 PureAir (demo). Demonstration account page.</footer>

  <script>
    // Read the email passed by the registration redirect and show it (textContent, not HTML — no injection).
    var email = new URLSearchParams(window.location.search).get('email') || '';
    document.getElementById('email').textContent = email;
  </script>
</body>
</html>
